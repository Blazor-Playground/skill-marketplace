name: Validate Plugin Structure

on:
  pull_request:
    paths:
      - 'plugins/**'
      - '.github/plugin/marketplace.json'
      - 'README.md'
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.github/plugin/marketplace.json'
      - 'README.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "::group::Checking marketplace.json"
          if [ -f .github/plugin/marketplace.json ]; then
            jq empty .github/plugin/marketplace.json
            echo "âś… marketplace.json is valid JSON"
          else
            echo "âš ď¸Ź No marketplace.json found â€” skipping"
          fi
          echo "::endgroup::"

          errors=0
          for f in plugins/*/plugin.json; do
            [ -f "$f" ] || continue
            echo "::group::Checking $f"
            if ! jq empty "$f" 2>/dev/null; then
              echo "::error file=$f::Invalid JSON"
              errors=$((errors + 1))
            else
              echo "âś… $f is valid JSON"
            fi
            echo "::endgroup::"
          done

          if [ $errors -gt 0 ]; then
            echo "::error::$errors plugin.json file(s) have invalid JSON"
            exit 1
          fi

      - name: Validate plugin structure
        run: |
          errors=0

          for dir in plugins/*/; do
            [ -d "$dir" ] || continue
            plugin=$(basename "$dir")
            if [ ! -f "$dir/plugin.json" ]; then
              echo "::warning file=$dir::Plugin '$plugin' has no plugin.json"
              continue
            fi

            has_component=false
            [ -d "$dir/skills" ] && has_component=true
            [ -d "$dir/agents" ] && has_component=true
            for key in mcpServers lspServers hooks commands; do
              if jq -e ".$key" "$dir/plugin.json" >/dev/null 2>&1; then
                has_component=true
              fi
            done

            if [ "$has_component" = false ]; then
              echo "::error file=$dir::Plugin '$plugin' has plugin.json but no components (skills/, agents/, mcpServers, lspServers, hooks, or commands)"
              errors=$((errors + 1))
            fi
          done

          # Every SKILL.md must have valid frontmatter (name + description)
          for skill in plugins/*/skills/*/SKILL.md; do
            [ -f "$skill" ] || continue
            if ! head -1 "$skill" | grep -q '^---'; then
              echo "::error file=$skill::SKILL.md missing YAML frontmatter"
              errors=$((errors + 1))
              continue
            fi
            frontmatter=$(sed -n '2,/^---$/p' "$skill" | sed '$d')
            if ! echo "$frontmatter" | grep -q '^name:'; then
              echo "::error file=$skill::SKILL.md frontmatter missing 'name' field"
              errors=$((errors + 1))
            fi
            if ! echo "$frontmatter" | grep -q '^description:'; then
              echo "::error file=$skill::SKILL.md frontmatter missing 'description' field"
              errors=$((errors + 1))
            fi
            if ! echo "$frontmatter" | python3 -c "import sys, yaml; yaml.safe_load(sys.stdin)" 2>/tmp/yaml_err; then
              echo "::error file=$skill::SKILL.md has unparseable YAML frontmatter: $(cat /tmp/yaml_err | head -1)"
              errors=$((errors + 1))
            fi
          done

          # Every agent .md must have frontmatter with name
          for agent in plugins/*/agents/*.agent.md; do
            [ -f "$agent" ] || continue
            if ! head -1 "$agent" | grep -q '^---'; then
              echo "::error file=$agent::Agent file missing YAML frontmatter"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::$errors structural issue(s) found"
            exit 1
          fi
          echo "âś… All plugin structures valid"

      - name: Warn on hardcoded MCP tool names in SKILL.md
        run: |
          warnings=0

          tool_pattern='`(maestro_[a-z_]+|hlx_[a-z_]+|search_pull_requests|list_pull_requests|list_commits|get_commit|get_file_contents|list_issues|search_issues|search_code|issue_read|pull_request_read)`'

          for skill in plugins/*/skills/*/SKILL.md; do
            [ -f "$skill" ] || continue
            body=$(sed '1,/^---$/d' "$skill" | sed '1,/^---$/d')
            matches=$(echo "$body" | grep -oEn "$tool_pattern" || true)
            if [ -n "$matches" ]; then
              count=$(echo "$matches" | wc -l)
              echo "::warning file=$skill::Found $count hardcoded MCP tool name(s) â€” prefer domain language (e.g., 'check build freshness' instead of \`maestro_build_freshness\`)"
              warnings=$((warnings + 1))
            fi
          done

          if [ $warnings -gt 0 ]; then
            echo "âš ď¸Ź $warnings skill(s) have hardcoded MCP tool names (warnings only, not blocking)"
          else
            echo "âś… No hardcoded MCP tool names found in skills"
          fi

      - name: Validate marketplace.json completeness
        run: |
          if [ ! -f .github/plugin/marketplace.json ]; then
            echo "âš ď¸Ź No marketplace.json found â€” skipping completeness check"
            exit 0
          fi

          errors=0

          marketplace_plugins=$(jq -r '.plugins[].name' .github/plugin/marketplace.json)
          for dir in plugins/*/; do
            [ -d "$dir" ] || continue
            plugin=$(basename "$dir")
            [ -f "$dir/plugin.json" ] || continue
            if ! echo "$marketplace_plugins" | grep -qx "$plugin"; then
              echo "::error::Plugin '$plugin' has plugin.json but is missing from marketplace.json"
              errors=$((errors + 1))
            fi
          done

          for plugin in $marketplace_plugins; do
            if [ ! -d "plugins/$plugin" ]; then
              echo "::error::marketplace.json lists '$plugin' but plugins/$plugin/ does not exist"
              errors=$((errors + 1))
            fi
          done

          while read name source; do
            if [ ! -d "$source" ]; then
              echo "::error::marketplace.json plugin '$name' has source '$source' but directory does not exist"
              errors=$((errors + 1))
            fi
          done < <(jq -r '.plugins[] | "\(.name) \(.source)"' .github/plugin/marketplace.json)

          if [ $errors -gt 0 ]; then
            echo "::error::$errors marketplace sync issue(s) found"
            exit 1
          fi
          echo "âś… marketplace.json in sync with plugin directories"

      - name: Validate README plugin table
        run: |
          errors=0

          for dir in plugins/*/; do
            [ -d "$dir" ] || continue
            plugin=$(basename "$dir")
            [ -f "$dir/plugin.json" ] || continue
            if ! grep -q "\\*\\*$plugin\\*\\*" README.md 2>/dev/null; then
              echo "::error::Plugin '$plugin' is not listed in README.md plugin table"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::$errors README table issue(s) found"
            exit 1
          fi
          echo "âś… README.md plugin table complete"
